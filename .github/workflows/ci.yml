name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Format + eval
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - run: nix fmt -- --ci
      - name: Run eval checks
        run: |
          CHECKS=$(nix eval '.#checks.x86_64-linux' \
            --apply 'cs: builtins.concatStringsSep " " (builtins.filter (n: builtins.match "eval-.*" n != null) (builtins.attrNames cs))' \
            --raw)
          if [ -z "$CHECKS" ]; then
            echo "::warning::No eval checks found"
            exit 0
          fi
          for check in $CHECKS; do
            echo "::group::$check"
            nix build ".#checks.x86_64-linux.$check" --no-link
            echo "::endgroup::"
          done
        env:
          NIX_CONFIG: "warn-dirty = false"
